<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="{% url "movies:index" %}">MOVIE</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              {% if request.user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url "movies:create" %}">영화 등록</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url "accounts:update" %}">회원정보수정</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url "accounts:profile" user.username%}">프로필</a>
                </li>
                <li class="nav-item">
                  <form action="{% url "accounts:logout" %}" method = 'POST'>
                    {% csrf_token %}
                    <input type="submit" value='로그아웃' class="nav-link">
                  </form>
                </li>
              {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url "accounts:signup" %}">회원가입</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url "accounts:login" %}">로그인</a>
                </li>
              {% endif %}
            </ul>
          </div>
        </div>
      </nav>

    {% block content %}
    {% endblock content %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
