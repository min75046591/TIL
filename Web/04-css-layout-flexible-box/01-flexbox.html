<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      height: 500px;
      border: 1px solid black;
      display: flex;
      /* 플렉스 디렉션의 기본값은 row로 되어있음 */
      /* flex-direction: row-reverse; */
      /* flex-direction: column;
      flex-direction: column-reverse; */
      
      flex-wrap: nowrap;
      flex-wrap: wrap;
      
      /* content: 여러줄, items: 한 줄, self: 요소 한개 */

      /* 주축 기준으로 바꾸기 */
      /* 기본값이 플렉스 스타트 */
      justify-content: flex-start;
      /* justify-content: center; */
      /* justify-content: flex-end; */
      
      /* 교차축 기준으로 바꾸기 */
      /* align-content: flex-start; */
      /* align-content: center; */
      /* align-content: flex-end; */

      /* align-items: center; */
    }

    .post {
      background-color: grey;
      border: 1px solid black;
      margin: 0.5rem;
      padding: 0.5rem;
    }

    .item1 {
      /* 교차점 기준으로 혼자 움직이는것 */
      align-self: flex-start;
    }

    .item2 {
      align-self: flex-end;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="post item1">
      <h2>Post Title 1</h2>
      <p>Post Content 1</p>
    </div>
    <div class="post item2">
      <h2>Post Title 2</h2>
      <p>Post Content 2</p>
    </div>
    <div class="post">
      <h2>Post Title 3</h2>
      <p>Post Content 3</p>
    </div>
    <div class="post">
      <h2>Post Title 4</h2>
      <p>Post Content 4</p>
    </div>
  </div>

</body>

</html>
