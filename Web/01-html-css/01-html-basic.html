<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My page</title>
</head>
<body>
    <!-- p 는 paragraph:문단 -->
    <p>My page</p> 
    <!-- Anchor (하이퍼 텍스트) -->
    <a href="https://www.google.co.kr">Google</a>
    <!-- 닫는 태그가 없다 -> 컨텐츠가 없다. -->
    <!-- alt는 이미지가 에러 뜰 때 메세지를 출력해줌 그래서 작성 꼭 필요 -->
    <!-- 시각 장애인 분들에게 도움이 된다 -->
    <img src="images/sample.png" alt="">

</body>
</html>
