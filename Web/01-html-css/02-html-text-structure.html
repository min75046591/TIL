<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- h는 마크다운에서 # 하나랑 같은 개념 -->
    <!-- h1 요소는 단순히 텍스트를 크게만 만드는게 아닌 현재 문서의 최상위 제목이라는 의미 -->
    <!-- 따라서 h1은 하나만 사용하길 권장 -->
    <h1>Heading</h1>
    <h2>Heading</h2>
    <!-- br : 엔터임 -->
    <p>text<br>text</p>
    <p>this is <em>emphasis</em></p>
    <p>hit <strong>my name</strong> is</p>
    <ol>
        <li>파이썬</li>
        <li>알고리즘</li>
        <li>웹</li>
    </ol>
    <ul>
        <li>파이썬</li>
        <li>알고리즘</li>
        <li>웹</li>
    </ul>
</body>
</html>
