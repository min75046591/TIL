<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Position</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      height: 1500px;
    }

    .container {
      position: relative; 
      height: 300px;
      width: 300px;
      border: 1px solid black;
    }

    .box {
      height: 100px;
      width: 100px;
      border: 1px solid black;
    }

    /* 기본 위치라 영향 없음 */
    .static {
      position: static;
      background-color: lightcoral;
    }

    /* 집을 나가는 친구라 레이아웃 자체가 깨질 위험이 있다 */
    /* 새로운 기준점이 필요 -> static이 아닌 부모를 찾음 */
    .absolute {
      position: absolute;
      background-color: lightgreen;
      top: 100px;
      left: 100px;
    }

    /* top 100을 줘도 위로 가지 않는다. 항상 영역 중점으로 생갈할것! */
    /* 본인의 static 위치를 기준으로 이동 */
    .relative {
      position: relative;
      background-color: lightblue;
      top: 100px;
      left: 100px;
    }

    /* 앱솔루트와 마찬가지로 집을 버리고 나감. 우리가 보는 화면 기준으로 본인의 위치에서 움직이지 않음 */
    /* 웹툰에서 다음화 보기 와 같은 리모컨. 어떠한 위치에 고정되어있는 것 */
      .fixed {
      position: fixed;
      background-color: gray;
      top: 0;
      right: 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="box static">Static</div>
    <div class="box absolute">Absolute</div>
    <div class="box relative">Relative</div>
    <div class="box fixed">Fixed</div>
  </div>
</body>

</html>
