<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div id="app">
    <!--  v-for에서 Vue 내부 동작시 key를 작성해야 Vue가 구분할 수 있음 -->
    <!-- key는 반드시 고유한 값을 나타낼 수 있는 식별자여야 함 -->
    <!-- vue의 정확한 동작을 위함 -->
    <div v-for="item in items" :key="item.id">
      <!-- content -->
      <p>{{ item }}</p>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp, ref, computed } = Vue

    const app = createApp({
      setup() {
        let id = 0

        const items = ref([
          { id: id++, name: 'Alice' },
          { id: id++, name: 'Bella' },
        ])

        return { items }
      }
    })

    app.mount('#app')
  </script>
</body>

</html>
