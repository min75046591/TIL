<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div id="app">
    <p>반응형 변수: {{refValue}}</p>
    <p>일반 변수: {{normalValue}}</p>
    <button v-on:click="increment">값 업데이트</button>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp, ref } = Vue

    const app = createApp({
      setup() {
        // 일반 변수
        let normalValue = 0
        // 반응형 변수
        const refValue = ref(0)

        const increment = function () {
          normalValue++  // 일반 변수 const는 재할당이 안됨 -> let으로 변경해줘야함
          refValue.value++  // 얘는 객체라 재할당 가능
        }

        return {
          normalValue,
          refValue,
          increment
        }
      }
    })

    app.mount('#app')
  </script>
</body>

</html>
