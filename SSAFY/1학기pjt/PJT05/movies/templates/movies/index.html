{% extends "base.html" %}

{% block content %}
<h1>INDEX PAGE</h1>

<div class="row row-cols-1 row-cols-md-3 g-4">
{% for movie in movies %}
    <div class="col">
      <div class="card">
        <h5 class="card-title">{{movie.title}}</h5>
        <div class="card-body">
          <p class="card-text text-truncate">{{movie.description}}</p>
          <a href="{% url "movies:detail" movie.pk %}" class="btn btn-primary">DETAIL</a>
        </div>
      </div>
    </div>  
{% endfor %}
</div>

{% endblock content %}
